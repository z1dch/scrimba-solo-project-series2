<!DOCTYPE html>
<html lang="en">

    <head>
        <!-- <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
        
        <title> Basketball Score Board</title>
    </head>

    <body>

        <div>
            <p id="home-score-el">0</p>
            <button onclick="updateCounter(homeScoreEl, 2)">+2</button>
            <button onclick="updateCounter(homeScoreEl, 3)">+3</button>
            <button onclick="updateCounter(homeScoreEl, -1)">-</button>
            <button onclick="updateCounter(homeScoreEl, 2)">Bonus</button>
            <button onclick="resetCounter(homeScoreEl, 0)">Reset</button>
        </div>

        <div>
            <p id="timeout-el">0</p>
            <button onclick="updateCounter(timeoutEl, -1)">-</button>
            <button onclick="updateCounter(timeoutEl, 1)">+</button>
        </div>

        <div>
            <p id="quarter-el">0</p>
            <button onclick="updateCounter(quarterEl, -1)">-</button>
            <button onclick="updateCounter(quarterEl, 1)">+</button>
        </div>

        <script src="index.js"></script>
        
    </body>

</html>
