<!DOCTYPE html>
<html lang="en">

    <head>
        <!-- <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
        
        <title> Basketball Score Board</title>
    </head>

    <body>

        <div>
            <p id="home-score-el">0</p>
            <button onclick="twoPoints()">+2</button>
            <button onclick="threePoints()">+3</button>
            <button onclick="onePoint()">Bonus</button>
            <button onclick="minusPoint()">-</button>
            <button onclick="resetPoints()">Reset</button>
        </div>

        <div>
            <p id="timeout-el">0</p>
            <button onclick="minusButton()">-</button>
            <button onclick="plusButton()">+</button>
        </div>

        <div>
            <p id="quarter-el">0</p>
            <button onclick="minusQuarter()">-</button>
            <button onclick="plusQuarter()">+</button>
        </div>

        <script src="index.js"></script>
        
    </body>

</html>
